name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++-14 cmake python3-dev python3-pip
        pip3 install matplotlib numpy --break-system-packages

    - name: Configure
      run: cmake -B build -DCMAKE_CXX_COMPILER=g++-14

    - name: Build
      run: cmake --build build --parallel

    - name: Test
      run: cd build && ctest --output-on-failure